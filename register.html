<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тіркелу | ӘлеуметКөмек</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="ornament-band"></div>

    <header>
        <div class="container">
            <div class="nav-bar">
                <a href="index.html" class="logo">
                    <div class="logo-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#E8C97A" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
                    </div>
                    <span>ӘлеуметКөмек
                        <span class="logo-sub">Әлеуметтік көмек порталы</span>
                    </span>
                </a>
                <nav>
                    <ul>
                        <li><a href="index.html">Басты бет</a></li>
                        <li><a href="aids.html">Көмек түрлері</a></li>
                        <li><a href="login.html">Кіру</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <section>
        <div class="container">
            <div class="form-wrapper">
                <h2 data-i18n="reg_title">Жаңа есептік жазба</h2>
                <p class="form-subtitle" data-i18n="reg_sub">Әлеуметтік көмек алу үшін порталда тіркеліңіз</p>

                <div id="alert-box"></div>

                <form id="registerForm">
                    <div class="form-group">
                        <label for="fullName" data-i18n="reg_lbl_name">Толық аты-жөні *</label>
                        <input type="text" id="fullName" required data-i18n-ph="reg_ph_name" placeholder="Мысалы: Әлімов Асхат Серікұлы">
                    </div>
                    <div class="form-group">
                        <label for="iin" data-i18n="reg_lbl_iin">ЖСН (ИИН) *</label>
                        <input type="text" id="iin" required maxlength="12" pattern="[0-9]{12}" data-i18n-ph="reg_ph_iin" placeholder="12 санды ЖСН">
                    </div>
                    <div class="form-group">
                        <label for="email" data-i18n="reg_lbl_email">Email *</label>
                        <input type="email" id="email" required placeholder="example@mail.kz">
                    </div>
                    <div class="form-group">
                        <label for="phone" data-i18n="reg_lbl_phone">Телефон *</label>
                        <input type="tel" id="phone" required placeholder="+7 (___) ___-__-__">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="password" data-i18n="reg_lbl_pass">Құпия сөз *</label>
                            <input type="password" id="password" required minlength="6">
                        </div>
                        <div class="form-group">
                            <label for="password2" data-i18n="reg_lbl_pass2">Қайталау *</label>
                            <input type="password" id="password2" required minlength="6">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" data-i18n="reg_btn">Тіркелу</button>
                    <p class="form-link">
                        <span data-i18n="reg_has_acc">Есептік жазбаңыз бар ма?</span> <a href="login.html" data-i18n="reg_login_link">Кіру</a>
                    </p>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 ӘлеуметКөмек порталы. Барлық құқықтар қорғалған.</p>
            </div>
        </div>
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/i18n.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const alertBox = document.getElementById('alert-box');

            const fullName = document.getElementById('fullName').value.trim();
            const iin = document.getElementById('iin').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const password2 = document.getElementById('password2').value;

            if (iin.length !== 12 || !/^\d+$/.test(iin)) {
                alertBox.innerHTML = `<div class="alert alert-danger">${I18N.t('reg_err_iin')}</div>`;
                return;
            }
            if (password !== password2) {
                alertBox.innerHTML = `<div class="alert alert-danger">${I18N.t('reg_err_pass')}</div>`;
                return;
            }
            if (password.length < 6) {
                alertBox.innerHTML = `<div class="alert alert-danger">${I18N.t('reg_err_len')}</div>`;
                return;
            }

            const result = await AUTH.register({ fullName, iin, email, phone, password });
            if (result.success) {
                alertBox.innerHTML = `<div class="alert alert-success">${result.message}</div>`;
                setTimeout(() => window.location.href = 'login.html', 1500);
            } else {
                alertBox.innerHTML = '<div class="alert alert-danger">' + result.message + '</div>';
            }
        });
    </script>
</body>
</html>
